<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TaskMaster Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="javascript.js"></script>
</head>
<body>
    <div class="app-container">
        
        <section id="inicio" class="screen active">
            <div class="hero-section" style="text-align:center; padding: 50px;">
                <h1>TASKMASTER PRO</h1>
                <p>Gestión de alto rendimiento</p>
                <button class="btn-primary" onclick="mostrar('login')">INICIAR SESIÓN</button>
                <button class="btn-outline" onclick="mostrar('registro')">REGISTRARSE</button>
            </div>
        </section>

        <section id="login" class="screen">
            <div class="form-card" style="max-width:400px; margin:auto;">
                <h2>Login</h2>
                <input type="email" id="emailUser" placeholder="Email" style="width:100%; margin:10px 0; padding:10px;">
                <input type="password" id="passUser" placeholder="Password" style="width:100%; margin:10px 0; padding:10px;">
                <button class="btn-primary" onclick="ejecutarLogin()" style="width:100%;">ENTRAR</button>
                <button class="btn-link" onclick="mostrar('inicio')">Volver</button>
            </div>
        </section>

        <section id="registro" class="screen">
            <div class="form-card" style="max-width:400px; margin:auto;">
                <h2>Registro</h2>
                <input type="text" id="regNombre" placeholder="Nombre Completo" style="width:100%; margin:10px 0; padding:10px;">
                <input type="email" id="regEmail" placeholder="Email Corporativo" style="width:100%; margin:10px 0; padding:10px;">
                <input type="password" id="regPass" placeholder="Contraseña" style="width:100%; margin:10px 0; padding:10px;">
                <button class="btn-primary" onclick="ejecutarRegistro()" style="width:100%;">REGISTRARME</button>
                <button class="btn-link" onclick="mostrar('inicio')">Volver</button>
            </div>
        </section>

        <section id="menu" class="screen">
            <div class="dashboard-grid">
                <div class="nav-card" onclick="mostrar('nueva')"><h3>Añadir Tarea</h3></div>
                <div class="nav-card" onclick="mostrar('pendientes')"><h3>Pendientes</h3></div>
                <div class="nav-card" onclick="mostrar('completadas')"><h3>Completadas</h3></div>
                <button class="btn-outline" onclick="mostrar('inicio')">Cerrar Sesión</button>
            </div>
        </section>

        <section id="nueva" class="screen">
            <div class="content-layout">
                <div class="task-form">
                    <h2>Nueva Tarea</h2>
                    <input type="text" id="taskInput" placeholder="Descripción" style="width:100%; padding:10px;">
                    <p>Fecha: <span id="selectedDateLabel">Ninguna</span></p>
                    <button class="btn-outline" onclick="toggleCalendar()">Abrir Calendario</button>
                    <button class="btn-primary" onclick="agregarTarea()">GUARDAR</button>
                    <button class="btn-link" onclick="mostrar('menu')">Cancelar</button>
                </div>
                <div id="calendarContainer" class="calendar-sidebar hidden">
                    <div id="calendar2026" class="year-view"></div>
                </div>
            </div>
        </section>

        <section id="pendientes" class="screen">
            <h2>Pendientes</h2>
            <ul id="listaPendientes" class="modern-list"></ul>
            <button class="btn-outline" onclick="mostrar('menu')">Volver</button>
        </section>

        <section id="completadas" class="screen">
            <h2>Completadas</h2>
            <ul id="listaCompletadas" class="modern-list"></ul>
            <button class="btn-outline" onclick="mostrar('menu')">Volver</button>
        </section>

    </div>
</body>
</html>
