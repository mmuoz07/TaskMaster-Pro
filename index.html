<body>
    <main class="app-container">
        
        <section id="inicio" class="screen active">
            <div class="hero-section">
                <div class="brand-badge">VERSION 2.0</div>
                <h1 class="logo-text">TASKMASTER<span>PRO</span></h1>
                <p class="hero-subtitle">Gestión de proyectos de alto rendimiento.</p>
                <div class="auth-buttons">
                    <button class="btn-primary" onclick="mostrar('login')">ACCEDER</button>
                    <button class="btn-outline" onclick="mostrar('registro')">CREAR CUENTA</button>
                </div>
            </div>
        </section>

        <section id="menu" class="screen">
            <header class="main-header">
                <div>
                    <h2 class="no-margin">Panel de Control</h2>
                    <p class="text-muted">Estado: Operativo</p>
                </div>
                <button class="btn-small-outline" onclick="mostrar('inicio')">SALIR</button>
            </header>
            <div class="dashboard-grid">
                <div class="nav-card" onclick="mostrar('nueva')">
                    <div class="status-indicator"></div>
                    <h3>Nueva Tarea</h3>
                    <p>Registrar objetivo</p>
                </div>
                <div class="nav-card" onclick="mostrar('pendientes')">
                    <div class="status-indicator active"></div>
                    <h3>Pendientes</h3>
                    <p>Revisiones en curso</p>
                </div>
                <div class="nav-card" onclick="mostrar('completadas')">
                    <div class="status-indicator success"></div>
                    <h3>Completadas</h3>
                    <p>Historial</p>
                </div>
            </div>
        </section>

        <section id="nueva" class="screen">
            <div class="form-card"> <h2>Configurar Registro</h2>
                <div class="input-group">
                    <label>Nombre del Proyecto</label>
                    <input type="text" id="taskInput" placeholder="Descripción técnica...">
                </div>
                <div class="date-selector">
                    <button class="btn-outline full-width" onclick="toggleCalendario()">DEFINIR PLAZO</button>
                    <p id="selectedDateText" class="date-display">Pendiente de fecha</p>
                </div>
                <button class="btn-primary full-width" onclick="agregarTarea()">CONFIRMAR REGISTRO</button>
                <button class="btn-link full-width" onclick="mostrar('menu')">CANCELAR</button>
            </div>
        </section>

        <section id="pendientes" class="screen">
            <h2>Tareas en Curso</h2> <div class="table-container">
                <ul id="listaPendientes" class="modern-list"></ul>
            </div>
            <button class="btn-primary full-width" onclick="mostrar('menu')">REGRESAR AL PANEL</button>
        </section>

    </main>
</body>
