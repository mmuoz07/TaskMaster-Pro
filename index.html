<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro - Gestor de Tareas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Contenedor Principal -->
    <div class="container">
        <!-- Sección de Bienvenida/Autenticación -->
        <div id="authSection" class="auth-section active">
            <!-- Panel de Login -->
            <div id="loginPanel" class="auth-panel active">
                <div class="auth-header">
                    <h1 class="app-title">TaskMaster Pro</h1>
                    <p class="app-subtitle">Gestor de tareas minimalista</p>
                </div>

                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="tu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Contraseña</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
                </form>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? <a href="#" class="toggle-auth" data-panel="register">Regístrate aquí</a></p>
                </div>
            </div>

            <!-- Panel de Registro -->
            <div id="registerPanel" class="auth-panel">
                <div class="auth-header">
                    <h1 class="app-title">TaskMaster Pro</h1>
                    <p class="app-subtitle">Crea tu cuenta</p>
                </div>

                <form class="auth-form" id="registerForm">
                    <div class="form-group">
                        <label for="registerName">Nombre Completo</label>
                        <input type="text" id="registerName" placeholder="Tu Nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" placeholder="tu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Contraseña</label>
                        <input type="password" id="registerPassword" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword2">Confirmar Contraseña</label>
                        <input type="password" id="registerPassword2" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Crear Cuenta</button>
                </form>

                <div class="auth-footer">
                    <p>¿Ya tienes cuenta? <a href="#" class="toggle-auth" data-panel="login">Inicia sesión aquí</a></p>
                </div>
            </div>
        </div>

        <!-- Sección de Tareas (Panel Principal) -->
        <div id="tasksSection" class="tasks-section">
            <div class="tasks-header">
                <div class="header-top">
                    <h2 class="welcome-message">Bienvenido, <span id="userName">Usuario</span></h2>
                    <button class="btn btn-logout" id="logoutBtn">Cerrar Sesión</button>
                </div>
            </div>

            <div class="tasks-container">
                <!-- Sección: Agregar Nueva Tarea -->
                <div class="add-task-section">
                    <form id="addTaskForm" class="add-task-form">
                        <input type="text" id="taskInput" placeholder="Añade una nueva tarea..." required>
                        <button type="submit" class="btn btn-add">+ Añadir</button>
                    </form>
                </div>

                <!-- Sección: Tareas Pendientes -->
                <div class="tasks-grid">
                    <div class="task-column">
                        <h3 class="column-title">📋 Tareas Pendientes</h3>
                        <div id="pendingTasks" class="task-list">
                            <!-- Las tareas se generarán aquí con JavaScript -->
                        </div>
                    </div>

                    <!-- Sección: Tareas Completadas -->
                    <div class="task-column">
                        <h3 class="column-title">✅ Tareas Completadas</h3>
                        <div id="completedTasks" class="task-list">
                            <!-- Las tareas completadas se generarán aquí -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
