<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TaskMaster Pro</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <link rel="stylesheet" href="style.css">

    <script src="javascript.js"></script>

</head>

<body>
    <div class="container">
        <section id="inicio" class="screen active">
            <div class="brand">TASKMASTER<span>PRO</span></div>
            <p>Gestión de tareas de alto rendimiento</p>
            <div class="button-stack">
                <button class="btn-primary" onclick="mostrar('login')">INICIAR SESIÓN</button>
                <button class="btn-secondary" onclick="mostrar('registro')">REGISTRARSE</button>
            </div>
        </section>

        <section id="login" class="screen">
            <h2>Acceso de Usuario</h2>
            <div class="form-group">
                <input type="email" placeholder="Correo electrónico" id="emailLogin">
                <input type="password" placeholder="Contraseña" id="passLogin">
            </div>
            <button class="btn-primary" onclick="mostrar('menu')">ENTRAR</button>
            <button class="btn-ghost" onclick="mostrar('inicio')">Volver al inicio</button>
        </section>

        <section id="registro" class="screen">
            <h2>Crear Perfil</h2>
            <div class="form-group">
                <input type="text" placeholder="Nombre completo">
                <input type="email" placeholder="Correo electrónico">
                <input type="password" placeholder="Contraseña">
            </div>
            <button class="btn-primary" onclick="mostrar('menu')">REGISTRAR CUENTA</button>
            <button class="btn-ghost" onclick="mostrar('inicio')">Volver al inicio</button>
        </section>

        <section id="menu" class="screen">
            <h2>Panel Principal</h2>
            <div class="dashboard-grid">
                <div class="dash-card" onclick="mostrar('nueva')">
                    <h3>Añadir Tarea</h3>
                    <small>Crear nueva entrada</small>
                </div>
                <div class="dash-card" onclick="mostrar('pendientes')">
                    <h3>Pendientes</h3>
                    <small>Ver tareas en curso</small>
                </div>
                <div class="dash-card" onclick="mostrar('completadas')">
                    <h3>Completadas</h3>
                    <small>Historial de éxito</small>
                </div>
                <div class="dash-card secondary" onclick="mostrar('inicio')">
                    <h3>Salir</h3>
                    <small>Cerrar sesión</small>
                </div>
            </div>
        </section>

        <section id="nueva" class="screen">
            <h2>Configurar Tarea</h2>
            <input type="text" id="taskInput" placeholder="Nombre de la tarea...">
            
            <div class="calendar-selector">
                <button class="btn-date" onclick="toggleCalendario()">
                    FECHA: <span id="selectedDateText">Seleccionar en calendario</span>
                </button>
                <div id="calendarWrapper" class="calendar-drawer hidden">
                    <div id="calendar2026Full" class="year-grid"></div>
                </div>
            </div>

            <button class="btn-primary success" onclick="agregarTarea()">GUARDAR TAREA</button>
            <button class="btn-ghost" onclick="mostrar('menu')">Cancelar</button>
        </section>

        <section id="pendientes" class="screen">
            <h2>Tareas en Curso</h2>
            <div class="list-container">
                <ul id="listaPendientes"></ul>
            </div>
            <button class="btn-ghost" onclick="mostrar('menu')">Volver al menú</button>
        </section>

        <section id="completadas" class="screen">
            <h2>Registro de Completadas</h2>
            <div class="list-container">
                <ul id="listaCompletadas"></ul>
            </div>
            <button class="btn-ghost" onclick="mostrar('menu')">Volver al menú</button>
        </section>
    </div>
   
</body>
</html>
